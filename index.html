<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>C-WAGS Scent Detective — Rules & Course Reference</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Source+Code+Pro:wght@400;600&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #f5f3f0;
    --bg2:       #ffffff;
    --bg3:       #f0ede8;
    --border:    #d8d0c8;
    --border2:   #c8bfb5;
    --amber:     #a06800;
    --amber2:    #8c6000;
    --amber-dim: #c8860a33;
    --green:     #1e5c30;
    --green2:    #2a7a45;
    --blue:      #1a4a7a;
    --blue2:     #1e6aad;
    --text:      #1a1612;
    --text2:     #4a4038;
    --text3:     #5c5248;
    --birch-bg:  #e8f5d8; --birch-b: #3a8a20; --birch-t: #2a6a10;
    --cyp-bg:    #d8eef8; --cyp-b:   #1a7aaa; --cyp-t:   #0a5a8a;
    --clove-bg:  #f8d8e8; --clove-b: #aa2060; --clove-t: #8a0a40;
    --anise-bg:  #f8ecd8; --anise-b: #aa6a10; --anise-t: #8a4a00;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Crimson Pro', Georgia, serif;
    min-height: 100vh;
  }

  /* ── HEADER ── */
  .header {
    background: var(--bg2);
    border-bottom: 2px solid var(--border2);
    padding: 18px 24px;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .header-logo {
    width: 48px; height: 48px;
    background: var(--amber);
    border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
    font-size: 26px;
    box-shadow: 0 0 20px var(--amber-dim);
  }
  .header-title { font-family: 'Playfair Display', serif; font-size: 24px; font-weight: 900; color: var(--text); line-height: 1; }
  .header-sub   { font-family: 'Source Code Pro', monospace; font-size: 10px; letter-spacing: 3px; color: var(--text3); text-transform: uppercase; margin-top: 4px; }
  .header-badge { margin-left: auto; font-family: 'Source Code Pro', monospace; font-size: 9px; color: var(--text3); letter-spacing: 2px; text-align: right; line-height: 1.8; }

  /* ── TABS ── */
  .tabs { display: flex; background: var(--bg2); border-bottom: 1px solid var(--border); padding: 0 24px; }
  .tab {
    padding: 14px 22px;
    font-family: 'Source Code Pro', monospace;
    font-size: 11px; letter-spacing: 2px; text-transform: uppercase;
    color: var(--text3); cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.15s;
  }
  .tab:hover { color: var(--text2); }
  .tab.active { color: var(--amber2); border-bottom-color: var(--amber2); }

  /* ── LAYOUT ── */
  .page { display: none; padding: 24px; max-width: 1100px; margin: 0 auto; }
  .page.active { display: block; }

  /* ── SERIES / CLASS SELECTORS ── */
  .selector-group { margin-bottom: 16px; }
  .selector-label { font-family: 'Source Code Pro', monospace; font-size: 9px; letter-spacing: 3px; color: var(--text3); text-transform: uppercase; margin-bottom: 8px; }
  .btn-row { display: flex; gap: 6px; flex-wrap: wrap; }
  .btn {
    padding: 8px 16px;
    background: var(--bg3);
    color: var(--text3);
    border: 1px solid var(--border);
    border-radius: 3px;
    cursor: pointer;
    font-family: 'Source Code Pro', monospace;
    font-size: 10px; letter-spacing: 1px;
    transition: all 0.12s;
  }
  .btn:hover { color: var(--text2); border-color: var(--border2); }
  .btn.active-det { background: #c8860a22; color: var(--amber2); border-color: var(--amber); }
  .btn.active-ran { background: #2e6b3e22; color: var(--green2); border-color: var(--green); }
  .btn.active-das { background: #1a4a7a22; color: var(--blue2);  border-color: var(--blue);  }

  /* ── RULES PANEL ── */
  .rules-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  @media(max-width:700px){ .rules-grid { grid-template-columns: 1fr; } }

  .card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 5px;
    overflow: hidden;
  }
  .card-header {
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: flex-start;
  }
  .card-title { font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 700; }
  .card-code  { font-family: 'Source Code Pro', monospace; font-size: 10px; color: var(--text3); margin-top: 3px; }
  .card-body  { padding: 14px 18px; }

  .rule-row {
    display: flex; justify-content: space-between; align-items: flex-start;
    padding: 7px 0; border-bottom: 1px solid var(--border); gap: 12px;
    font-size: 14px;
  }
  .rule-row:last-child { border-bottom: none; }
  .rule-label { color: var(--text3); min-width: 160px; flex-shrink: 0; }
  .rule-val   { color: var(--text); text-align: right; }
  .rule-val.hl{ color: var(--amber2); font-weight: 600; }
  .rule-val.warn { color: #9a4e00; font-weight: 600; }
  .rule-val.danger { color: #c0392b; font-weight: 600; }

  .scent-pill {
    display: inline-block;
    padding: 3px 10px; border-radius: 12px;
    font-family: 'Source Code Pro', monospace; font-size: 11px;
    margin: 2px;
  }
  .special-rule { display: flex; gap: 8px; padding: 5px 0; font-size: 13px; color: var(--text2); line-height: 1.5; border-bottom: 1px solid var(--border); }
  .special-rule:last-child { border-bottom: none; }
  .special-rule-icon { color: var(--amber); flex-shrink: 0; }

  .pass-box {
    background: #fdf8ee;
    border: 1px solid var(--amber-dim);
    border-radius: 4px;
    padding: 10px 14px;
    font-size: 13px; color: var(--text2);
    line-height: 1.5;
    font-style: italic;
  }
  .prereq-box {
    background: #f5f2ee;
    border: 1px solid var(--border2);
    border-radius: 4px;
    padding: 8px 14px;
    font-size: 12px; color: var(--text3);
    font-family: 'Source Code Pro', monospace;
    margin-top: 8px;
  }

  /* ── COURSE SETUP PAGE ── */
  .setup-layout { display: grid; grid-template-columns: 1fr 300px; gap: 20px; align-items: start; }
  @media(max-width:800px){ .setup-layout { grid-template-columns: 1fr; } }

  .grid-wrap {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 5px;
    padding: 16px;
    overflow-x: auto;
  }
  .grid-title { font-family: 'Source Code Pro', monospace; font-size: 9px; letter-spacing: 3px; color: var(--text3); text-transform: uppercase; margin-bottom: 12px; }

  /* Grid rendered by JS into #grid-container */
  #grid-container { display: inline-block; }

  /* ── MEASUREMENT RULER CELLS ── */
  .ruler-cell {
    display: flex; align-items: center; justify-content: flex-end;
    font-family: 'Source Code Pro', monospace;
    font-size: 8px; color: var(--text3);
    padding-right: 4px;
    border-right: 1px solid var(--border2);
    user-select: none;
  }
  .ruler-cell-bot {
    display: flex; align-items: flex-start; justify-content: center;
    font-family: 'Source Code Pro', monospace;
    font-size: 8px; color: var(--text3);
    border-top: 1px solid var(--border2);
    padding-top: 3px;
    user-select: none;
  }

  .grid-cell {
    border: 1px solid #d8d0c8;
    display: flex; align-items: center; justify-content: center;
    position: relative; flex-shrink: 0;
    font-size: 0; /* set by JS */
    transition: background 0.2s;
  }
  .grid-cell.empty    { background: #f8f6f3; }
  .grid-cell.item     { background: #ffffff; border-color: var(--border); }
  .grid-cell.handler  {
    background: repeating-linear-gradient(90deg,#c8860a18 0,#c8860a18 4px,transparent 4px,transparent 8px);
    border-top: 2px dashed var(--amber);
  }
  .grid-cell.startln  {
    background: repeating-linear-gradient(90deg,#1e6aad18 0,#1e6aad18 4px,transparent 4px,transparent 8px);
    border-top: 2px dashed var(--blue2);
  }
  .grid-cell .cell-icon { pointer-events: none; }
  .grid-cell .hide-badge {
    position: absolute; inset: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    border-radius: 2px;
    font-family: 'Source Code Pro', monospace; font-weight: 700;
  }
  .grid-cell .dist-badge {
    position: absolute; bottom: 1px; right: 2px;
    font-family: 'Source Code Pro', monospace; font-size: 7px;
    color: var(--amber2); opacity: 0.7;
  }

  /* ── SIDE PANEL ── */
  .side-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 5px; margin-bottom: 12px; overflow: hidden; }
  .side-card-head { padding: 10px 14px; border-bottom: 1px solid var(--border); font-family: 'Source Code Pro', monospace; font-size: 9px; letter-spacing: 3px; text-transform: uppercase; color: var(--text3); }
  .side-card-body { padding: 12px 14px; }

  .stat-row { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
  .stat-row:last-child { border-bottom: none; }
  .stat-label { color: var(--text3); }
  .stat-val   { color: var(--text); font-family: 'Source Code Pro', monospace; font-size: 12px; }
  .stat-val.hl { color: var(--amber2); }

  .hide-list-item {
    display: flex; align-items: center; gap: 8px;
    padding: 6px 0; border-bottom: 1px solid var(--border); font-size: 13px;
  }
  .hide-list-item:last-child { border-bottom: none; }
  .hide-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

  .legend-row { display: flex; align-items: center; gap: 8px; padding: 4px 0; font-size: 12px; color: var(--text2); }
  .legend-swatch { width: 16px; height: 16px; border-radius: 2px; flex-shrink: 0; }

  .btn-primary {
    display: block; width: 100%;
    padding: 12px;
    background: var(--amber);
    color: #fff;
    border: none; border-radius: 4px;
    cursor: pointer;
    font-family: 'Source Code Pro', monospace;
    font-size: 11px; letter-spacing: 2px; font-weight: 600; text-transform: uppercase;
    transition: background 0.15s;
  }
  .btn-primary:hover { background: var(--amber2); }
  .btn-secondary {
    display: block; width: 100%;
    padding: 10px;
    background: var(--bg3);
    color: var(--text2);
    border: 1px solid var(--border2); border-radius: 4px;
    cursor: pointer;
    font-family: 'Source Code Pro', monospace;
    font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
    margin-top: 8px; transition: all 0.15s;
  }
  .btn-secondary:hover { color: var(--text); border-color: var(--text3); }

  .dim-info {
    font-family: 'Source Code Pro', monospace;
    font-size: 10px; color: var(--text3);
    text-align: center; margin-top: 8px;
    letter-spacing: 1px;
  }
  .annotation {
    font-family: 'Source Code Pro', monospace;
    font-size: 9px; color: var(--amber2);
    background: #c8860a18;
    border: 1px solid var(--amber-dim);
    border-radius: 3px;
    padding: 4px 8px;
    margin-top: 6px;
    display: inline-block;
  }
  .annotation + .annotation { margin-left: 6px; }

  /* ── SERIES ACCENT LEFT BORDER ── */
  .det-accent { border-left: 3px solid var(--amber); }
  .ran-accent { border-left: 3px solid var(--green2); }
  .das-accent { border-left: 3px solid var(--blue2); }

  /* fade in */
  @keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }
  .fade-in { animation: fadeIn 0.25s ease; }

  .full-width { grid-column: 1 / -1; }

  /* ══ MOBILE — PHONES ══════════════════════════════════════════ */
  @media(max-width:600px) {
    /* ── Header: hide badge, shrink logo & title ── */
    .header { padding: 10px 12px; gap: 10px; }
    .header-logo { width: 36px; height: 36px; font-size: 20px; flex-shrink: 0; }
    .header-title { font-size: 17px; }
    .header-sub { font-size: 9px; letter-spacing: 1px; }
    .header-badge { display: none; }

    /* ── Tabs: scrollable, tighter padding ── */
    .tabs { padding: 0 4px; overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
    .tabs::-webkit-scrollbar { display: none; }
    .tab { padding: 12px 16px; font-size: 10px; letter-spacing: 1px; white-space: nowrap; flex-shrink: 0; }

    /* ── Page: tighter padding ── */
    .page { padding: 10px; }

    /* ── Selector labels & buttons ── */
    .selector-label { font-size: 10px; letter-spacing: 1px; }
    .btn { padding: 10px 14px; font-size: 11px; touch-action: manipulation; }

    /* ── Rule rows: stack label over value ── */
    .rule-row { flex-direction: column; gap: 3px; padding: 10px 0; }
    .rule-label { min-width: unset; font-size: 12px; }
    .rule-val { text-align: left; font-size: 15px; }

    /* ── Main rules card header: stack title above badges ── */
    .card-header { flex-direction: column; gap: 10px; }
    .card-header > div:last-child { align-items: flex-start !important; }
    .card-title { font-size: 17px; }

    /* ── Tiny labels → readable on mobile ── */
    .card-code,
    .grid-title,
    .side-card-head,
    .annotation { font-size: 10px; letter-spacing: 1px; }

    /* ── Special rules & pass box ── */
    .special-rule { font-size: 14px; }
    .pass-box { font-size: 14px; }
    .prereq-box { font-size: 12px; }

    /* ── Side panel: slightly larger text ── */
    .stat-row { font-size: 14px; }
    .stat-val { font-size: 13px; }
    .legend-row { font-size: 13px; }
    .legend-swatch { width: 20px; height: 20px; }
    .hide-list-item { font-size: 13px; flex-wrap: wrap; }

    /* ── Action buttons: bigger tap targets ── */
    .btn-primary  { padding: 15px; font-size: 12px; touch-action: manipulation; }
    .btn-secondary { padding: 13px; font-size: 11px; touch-action: manipulation; }

    /* ── Scent pills: slightly bigger ── */
    .scent-pill { font-size: 12px; padding: 4px 12px; }
  }
</style>
</head>

let rulesState = { series:"Detective", classKey:"patrol1" };
let setupState = { series:"Detective", classKey:"patrol1", gridData:null };

// ── TAB SWITCH ───────────────────────────────────────────────
function switchTab(name) {
  document.querySelectorAll('.tab').forEach((t,i)=>{
    t.classList.toggle('active', (i===0&&name==='rules')||(i===1&&name==='setup'));
  });
  document.getElementById('page-rules').classList.toggle('active', name==='rules');
  document.getElementById('page-setup').classList.toggle('active', name==='setup');
}

// ── HELPERS ──────────────────────────────────────────────────
function fmtTime(s) {
  if(!s) return null;
  const m=Math.floor(s/60),sec=s%60;
  return m===0?`${sec} sec`:`${m}:${sec.toString().padStart(2,"0")} min`;
}
function randInt(min,max){ return Math.floor(Math.random()*(max-min+1))+min; }
function shuffle(arr){ const a=[...arr]; for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]; } return a; }
function pickScents(rule){
  const count=rule.unknownCount?randInt(rule.hideRange[0],rule.hideRange[1]):rule.hides;
  return Array.from({length:count},()=>rule.scents[randInt(0,rule.scents.length-1)]);
}

// ── SERIES BUTTON BUILDERS ───────────────────────────────────
function buildSeriesBtns(containerId, stateName, onSelect) {
  const container = document.getElementById(containerId);
  container.innerHTML='';
  Object.entries(SERIES).forEach(([name,meta])=>{
    const btn=document.createElement('button');
    btn.className='btn'+(window[stateName].series===name?' '+meta.activeClass:'');
    btn.textContent=name;
    btn.onclick=()=>{ window[stateName].series=name; onSelect(SERIES[name].classes[0]); buildSeriesBtns(containerId,stateName,onSelect); };
    container.appendChild(btn);
  });
}
function buildClassBtns(containerId, stateName, onSelect) {
  const container = document.getElementById(containerId);
  container.innerHTML='';
  const s=window[stateName].series;
  const meta=SERIES[s];
  meta.classes.forEach(k=>{
    const btn=document.createElement('button');
    btn.className='btn'+(window[stateName].classKey===k?' '+meta.activeClass:'');
    btn.textContent=CLASSES[k].code;
    btn.onclick=()=>{ window[stateName].classKey=k; onSelect(k); buildClassBtns(containerId,stateName,onSelect); };
    container.appendChild(btn);
  });
}

function renderRules(classKey) {
  rulesState.classKey=classKey;
  const rule=CLASSES[classKey];
  const s=SERIES[rule.series];
  const panel=document.getElementById('rules-panel');

  const accentClass = rule.series==='Detective'?'det-accent':rule.series==='Ranger'?'ran-accent':'das-accent';
  const accentColor = s.accent;

  // Scent pills HTML
  const allScents=["Birch","Cypress","Clove Bud","Anise"];
  const scentPills=allScents.map(sc=>{
    const m=SCENT_META[sc];
    const avail=rule.scents.includes(sc);
    return `<span class="scent-pill" style="background:${avail?m.bg:'#e8e4e0'};border:1px solid ${avail?m.border:'#c8c0b8'};color:${avail?m.text:'#4a4238'};text-decoration:${avail?'none':'line-through'}">${sc}</span>`;
  }).join('');

  // Time
  const timeStr = rule.timeRange || fmtTime(rule.timeSeconds) || '—';

  // Hides
  const hidesStr = rule.unknownCount
    ? `${rule.hideRange[0]}–${rule.hideRange[1]} <span style="color:#9a4e00">(unknown to handler)</span>`
    : rule.hides;

  // Search area
  const areaStr = rule.searchArea
    ? `${rule.searchArea.min}–${rule.searchArea.max} sq ft`
    : rule.handlerDistFt
      ? `Handler distance: ${rule.handlerDistFt.min}–${rule.handlerDistFt.max} ft`
      : rule.groups > 0
        ? `${rule.groups} groups × ${rule.itemsPerGroup} items`
        : '—';

  const specialHTML = rule.specialRules.map(r=>`
    <div class="special-rule">
      <span class="special-rule-icon">${r.startsWith('⚠')||r.startsWith('⚡')?'':'›'}</span>
      <span>${r}</span>

  <div class="fade-in">
    <div class="card ${accentClass}" style="margin-bottom:16px;">
      <div class="card-header" style="background:${s.color}18">
        <div>
          <div style="font-size:10px;color:${accentColor};font-family:'Source Code Pro',monospace;letter-spacing:3px;text-transform:uppercase;margin-bottom:4px">${rule.series} Series</div>
          <div class="card-title" style="color:#1a1612">${rule.name}</div>
          <div class="card-code">${rule.code}</div>

          <span style="background:#f5f0e8;border:1px solid #d0c8b8;color:#4a4038;font-family:'Source Code Pro',monospace;font-size:10px;padding:3px 10px;border-radius:3px">${timeStr}</span>
          ${rule.offLeash?'<span style="background:#3a1a1a;border:1px solid #ff6b6b44;color:#ff6b6b;font-family:\'Source Code Pro\',monospace;font-size:10px;padding:3px 10px;border-radius:3px">⚠ OFF LEASH</span>':''}
          ${rule.callFinish?'<span style="background:#2a1a0a;border:1px solid #ff9f4344;color:#ff9f43;font-family:\'Source Code Pro\',monospace;font-size:10px;padding:3px 10px;border-radius:3px">⚠ CALL FINISH</span>':''}
        </div>
      </div>
    </div>

    <div class="rules-grid">
      <div class="card">
        <div class="card-header"><span style="color:${accentColor};font-family:'Source Code Pro',monospace;font-size:11px;letter-spacing:2px;text-transform:uppercase">Search Parameters</span></div>
        <div class="card-body">
          <div class="rule-row"><span class="rule-label">Hides</span><span class="rule-val hl">${hidesStr}</span></div>
          <div class="rule-row"><span class="rule-label">Time Limit</span><span class="rule-val hl">${timeStr}</span></div>
          <div class="rule-row"><span class="rule-label">Items in Search</span><span class="rule-val">${rule.itemCount.min}${rule.itemCount.max!==rule.itemCount.min?'–'+rule.itemCount.max:''} items</span></div>

      </div>

      <div class="card full-width">
        <div class="card-header"><span style="color:${accentColor};font-family:'Source Code Pro',monospace;font-size:11px;letter-spacing:2px;text-transform:uppercase">Pass Criteria</span></div>
        <div class="card-body">
          <div class="pass-box">${rule.passCriteria}</div>
          ${rule.prerequisites?`<div class="prereq-box">🔒 Prerequisite: ${rule.prerequisites}</div>`:''}
        </div>
      </div>
    </div>
  </div>`;
}

// ══════════════════════════════════════════════════════════════
// COURSE SETUP MAP — GRID GENERATOR WITH REAL MEASUREMENTS
// 1 cell = 1 foot × 1 foot (except Dasher which uses inches)
// ══════════════════════════════════════════════════════════════
function generateSetupGrid(classKey) {
  const rule = CLASSES[classKey];
  const hideScents = pickScents(rule);
  const hideCount = hideScents.length;

  let cols, rows, cellFt, searchSqFt=null;
  let placedItems=[], placedHides=[], handlerRowIdx=null, startLineRowIdx=null;

  // ── Room size from sq ft (Detective classes) ──────────────
  if(rule.searchArea) {
    searchSqFt = randInt(rule.searchArea.min, rule.searchArea.max);
    const ratio = rule.roomAspect ? rule.roomAspect[1] : 1.3;
    // width × height × ratio = sqft → width = sqrt(sqft/ratio)
    cols = Math.round(Math.sqrt(searchSqFt / ratio));
    rows = Math.round(searchSqFt / cols);
    cellFt = 1; // 1 cell = 1 foot
  }
  // ── Ranger: fixed by handler distance ────────────────────
  else if(rule.handlerLine && rule.handlerDistFt) {
    const depth = rule.handlerDistFt.max + 6; // search area + handler zone
    rows = depth;
    cols = rule.itemCount.max > 12 ? 20 : 16;
    cellFt = 1;
    handlerRowIdx = rule.handlerDistFt.max; // handler line at max distance
  }
  // ── Dasher: fixed by group layout ────────────────────────
  else if(rule.groups > 0) {
    // Dasher 3: single row → 3 groups × 3 items + gaps
    if(rule.layout==='dasher_single_row') {
      cols = rule.groups * (rule.itemsPerGroup + 1) - 1 + 2; // +2 for margins
      rows = 5; // start line + items + space
    } else {
      // 2×2 grid of groups
      cols = rule.itemsPerGroup * 2 + 3; // 2 groups per row + gaps
      rows = 7; // top groups + gap + bottom groups + start area
    }
    cellFt = 2; // each cell = 2 ft for readability
    startLineRowIdx = rows - 1;
  }
  else {
    cols = 16; rows = 12; cellFt = 1;
  }

  // Clamp reasonable screen sizes
  cols = Math.max(8, Math.min(cols, 35));
  rows = Math.max(5, Math.min(rows, 30));

  // Init grid
  const cells = Array.from({length:rows},(_,r)=>
    Array.from({length:cols},(_,c)=>({
      row:r,col:c, type:'empty', itemKind:null,
      isHide:false, scent:null, isDistraction:false
    }))
  );

  // ── PLACE ITEMS BY LAYOUT ────────────────────────────────
  if(rule.layout==='single_row') {
    // Items in top row
    const itemCount = rule.itemCount.min;
    let chairsLeft = rule.itemType==='mixed_chairs' ? randInt(4,5) : 0;
    const itemCols = shuffle([...Array(cols).keys()]).slice(0,itemCount).sort((a,b)=>a-b);
    itemCols.forEach(c=>{
      const kind = chairsLeft>0?'chair':(rule.itemType==='box'?'box':'item');
      if(chairsLeft>0)chairsLeft--;
      cells[0][c].type='item'; cells[0][c].itemKind=kind;
      placedItems.push({row:0,col:c,kind});
    });
    // Handler line
    if(handlerRowIdx!=null)
      for(let c=0;c<cols;c++) cells[handlerRowIdx][c].type='handler';
    // Place hides
    shuffle([...placedItems]).slice(0,hideCount).forEach((pos,i)=>{
      cells[pos.row][pos.col].isHide=true; cells[pos.row][pos.col].scent=hideScents[i];
      placedHides.push({...pos,scent:hideScents[i]});
    });
  }
  else if(rule.layout==='perimeter_3sides') {
    if(handlerRowIdx!=null)
      for(let c=0;c<cols;c++) cells[handlerRowIdx][c].type='handler';
    let cands=[];
    for(let r=0;r<handlerRowIdx;r++)
      for(let c=0;c<cols;c++)
        if(r===0||c===0||c===cols-1) cands.push({row:r,col:c});
    let chairsLeft=3;
    shuffle(cands).slice(0,rule.itemCount.min).forEach(pos=>{
      const kind=chairsLeft>0?'chair':'item'; if(chairsLeft>0)chairsLeft--;
      cells[pos.row][pos.col].type='item'; cells[pos.row][pos.col].itemKind=kind;
      placedItems.push({...pos,kind});
    });
    if(rule.distractions>0){
      const d=shuffle([...placedItems])[0];
      cells[d.row][d.col].isDistraction=true;
    }
    shuffle(placedItems.filter(p=>!cells[p.row][p.col].isDistraction)).slice(0,hideCount).forEach((pos,i)=>{
      cells[pos.row][pos.col].isHide=true; cells[pos.row][pos.col].scent=hideScents[i];
      placedHides.push({...pos,scent:hideScents[i]});
    });
  }
  else if(rule.layout==='chairgroup_plus_perimeter') {
    const cr=Math.floor(rows/2), cc=Math.floor(cols/2);
    [[cr-1,cc-1],[cr-1,cc],[cr-1,cc+1],[cr,cc-1],[cr,cc+1]]
      .filter(([r,c])=>r>=0&&c>=0&&r<rows&&c<cols)
      .forEach(([r,c])=>{
        cells[r][c].type='item'; cells[r][c].itemKind='chair';
        placedItems.push({row:r,col:c,kind:'chair'});
      });
    let perimCands=[];
    for(let r=0;r<rows;r++) for(let c=0;c<cols;c++)
      if(r===0||r===rows-1||c===0||c===cols-1)
        if(!placedItems.find(p=>p.row===r&&p.col===c))
          perimCands.push({row:r,col:c});
    shuffle(perimCands).slice(0,9).forEach(pos=>{
      cells[pos.row][pos.col].type='item'; cells[pos.row][pos.col].itemKind='item';
      placedItems.push({...pos,kind:'item'});
    });
    const chairs=placedItems.filter(p=>p.kind==='chair');
    const perims=placedItems.filter(p=>p.kind==='item');
    if(chairs.length){const h=chairs[randInt(0,chairs.length-1)];cells[h.row][h.col].isHide=true;cells[h.row][h.col].scent=hideScents[0];placedHides.push({...h,scent:hideScents[0]});}
    if(perims.length&&hideScents[1]){const h=perims[randInt(0,perims.length-1)];cells[h.row][h.col].isHide=true;cells[h.row][h.col].scent=hideScents[1];placedHides.push({...h,scent:hideScents[1]});}
  }
  else if(rule.layout==='dasher_single_row') {
    if(startLineRowIdx!=null)
      for(let c=0;c<cols;c++) cells[startLineRowIdx][c].type='startln';
    for(let g=0;g<rule.groups;g++){
      const startCol = 1 + g*(rule.itemsPerGroup+1);
      const groupItems=[];
      for(let i=0;i<rule.itemsPerGroup;i++){
        const c=startCol+i;
        if(c>=cols)continue;
        cells[0][c].type='item'; cells[0][c].itemKind='box';
        groupItems.push({row:0,col:c,kind:'box'});
        placedItems.push({row:0,col:c,kind:'box'});
      }
      const hc=groupItems[randInt(0,groupItems.length-1)];
      cells[hc.row][hc.col].isHide=true; cells[hc.row][hc.col].scent=hideScents[g];
      placedHides.push({...hc,scent:hideScents[g]});
    }
  }
  else if(rule.layout==='dasher_2x2') {
    if(startLineRowIdx!=null)
      for(let c=0;c<cols;c++) cells[startLineRowIdx][c].type='startln';
    const gapRow=Math.floor(rows/2);
    const glayouts=[
      {row:0,startCol:1},
      {row:0,startCol:rule.itemsPerGroup+2},
      {row:gapRow+1,startCol:1},
      {row:gapRow+1,startCol:rule.itemsPerGroup+2},
    ];
    glayouts.forEach(({row:gr,startCol},g)=>{
      if(g>=hideCount)return;
      const groupItems=[];
      for(let i=0;i<rule.itemsPerGroup;i++){
        const c=startCol+i;
        if(c>=cols||gr>=rows-1)continue;
        const kind=i<Math.ceil(rule.itemsPerGroup/2)?'box':'item';
        cells[gr][c].type='item'; cells[gr][c].itemKind=kind;
        groupItems.push({row:gr,col:c,kind});
        placedItems.push({row:gr,col:c,kind});
      }
      if(!groupItems.length)return;
      const hc=groupItems[randInt(0,groupItems.length-1)];
      cells[hc.row][hc.col].isHide=true; cells[hc.row][hc.col].scent=hideScents[g]||hideScents[0];
      placedHides.push({...hc,scent:hideScents[g]||hideScents[0]});
    });
    if(rule.distractions>0){
      const avail=placedItems.filter(p=>!cells[p.row][p.col].isHide);
      shuffle(avail).slice(0,rule.distractions).forEach(pos=>cells[pos.row][pos.col].isDistraction=true);
    }
  }
  else { // scattered
    const maxRow = handlerRowIdx!=null?handlerRowIdx:rows;
    if(handlerRowIdx!=null)
      for(let c=0;c<cols;c++) cells[handlerRowIdx][c].type='handler';
    let cands=[];
    for(let r=0;r<maxRow;r++) for(let c=0;c<cols;c++) cands.push({row:r,col:c});
    const count=randInt(rule.itemCount.min,rule.itemCount.max);
    let chairsLeft=rule.itemType==='mixed'?Math.min(Math.floor(count*0.25),5):0;
    shuffle(cands).slice(0,count).forEach(pos=>{
      const kind=rule.itemType==='box'?'box':chairsLeft>0?(chairsLeft--,'chair'):'item';
      cells[pos.row][pos.col].type='item'; cells[pos.row][pos.col].itemKind=kind;
      placedItems.push({...pos,kind});
    });
    if(rule.distractions>0){
      shuffle([...placedItems]).slice(0,rule.distractions).forEach(pos=>cells[pos.row][pos.col].isDistraction=true);
    }
    shuffle(placedItems.filter(p=>!cells[p.row][p.col].isDistraction)).slice(0,hideCount).forEach((pos,i)=>{
      cells[pos.row][pos.col].isHide=true; cells[pos.row][pos.col].scent=hideScents[i];
      placedHides.push({...pos,scent:hideScents[i]});
    });
  }

  return { cells, placedItems, placedHides, hideCount, handlerRowIdx, startLineRowIdx,
           rows, cols, cellFt, searchSqFt, hideScents };
}

// ── RENDER THE GRID WITH MEASUREMENTS ────────────────────────
function renderSetupGrid() {
  const classKey = setupState.classKey;
  const rule = CLASSES[classKey];
  const data = generateSetupGrid(classKey);
  setupState.gridData = data;

  const { cells, rows, cols, cellFt, searchSqFt, handlerRowIdx, placedHides, placedItems } = data;
  const s = SERIES[rule.series];

  // Cell pixel size — responsive
  const maxPx = Math.min(580, window.innerWidth - 48);
  const cellPx = Math.max(22, Math.min(36, Math.floor(maxPx / cols)));
  const rulerW = 28; // width of row-label column

  const container = document.getElementById('grid-container');
  container.innerHTML='';

  // Build grid as a table-like flex structure
  for(let r=0;r<rows;r++){
    const rowDiv=document.createElement('div');
    rowDiv.style.cssText='display:flex;';

    // ── Row ruler label (shows foot measurement) ──────────
    const rulerCell=document.createElement('div');
    rulerCell.className='ruler-cell';
    rulerCell.style.cssText=`width:${rulerW}px;height:${cellPx}px;`;
    // Show label every 2 feet, or at handler/start lines
    const showLabel = r % 2 === 0 || r === handlerRowIdx || r === rows-1;
    if(showLabel) rulerCell.textContent = (r * cellFt) + (cellFt>1?'':'\'');
    rowDiv.appendChild(rulerCell);

    for(let c=0;c<cols;c++){
      const cell=cells[r][c];
      const div=document.createElement('div');
      div.className='grid-cell';
      div.style.cssText=`width:${cellPx}px;height:${cellPx}px;font-size:${cellPx*0.44}px;`;

      if(cell.type==='handler'){
        div.classList.add('handler');
        if(c===0){
          const lbl=document.createElement('span');
          lbl.style.cssText=`font-family:'Source Code Pro',monospace;font-size:7px;color:#8c6000;position:absolute;left:2px;top:2px;`;
          lbl.textContent='HANDLER LINE';
          div.appendChild(lbl);
        }
      } else if(cell.type==='startln'){
        div.classList.add('startln');
      } else if(cell.type==='item'){
        div.classList.add('item');
        const icon=document.createElement('span');
        icon.className='cell-icon';
        if(cell.itemKind==='box') { icon.textContent='□'; icon.style.color='#7a5a20'; }
        else if(cell.itemKind==='chair'){ icon.textContent='🪑'; }
        else { icon.textContent='▽'; icon.style.color='#1e5c30'; }
        div.style.border=cell.isDistraction?'1px solid #ff6b6b':'1px solid #2a2420';
        if(cell.isDistraction){
          const db=document.createElement('span');
          db.style.cssText='position:absolute;top:1px;right:2px;font-family:\'Source Code Pro\',monospace;font-size:7px;color:#c0392b;font-weight:700;';
          db.textContent='D';
          div.appendChild(db);
        }
        // Hide badge
        if(cell.isHide && cell.scent){
          const m=SCENT_META[cell.scent];
          const badge=document.createElement('div');
          badge.className='hide-badge';
          badge.style.cssText=`background:${m.bg};border:2px solid ${m.border};box-shadow:0 0 8px ${m.border}55;`;
          badge.innerHTML=`<span style="font-family:'Source Code Pro',monospace;font-size:${cellPx*0.28}px;color:${m.text};font-weight:700">${m.label}</span>`;
          div.appendChild(badge);
        } else {
          div.appendChild(icon);
        }
      } else {
        div.classList.add('empty');
      }
      rowDiv.appendChild(div);
    }
    container.appendChild(rowDiv);
  }

  // ── Bottom ruler (column foot labels) ──────────────────
  const botRow=document.createElement('div');
  botRow.style.cssText='display:flex;';
  const cornerSpacer=document.createElement('div');
  cornerSpacer.style.cssText=`width:${rulerW}px;height:16px;`;
  botRow.appendChild(cornerSpacer);
  for(let c=0;c<cols;c++){
    const rc=document.createElement('div');
    rc.className='ruler-cell-bot';
    rc.style.cssText=`width:${cellPx}px;height:16px;`;
    if(c % 2 === 0) rc.textContent=(c*cellFt)+(cellFt>1?'':'\'');
    botRow.appendChild(rc);
  }
  container.appendChild(botRow);

  // ── Foot label ──────────────────────────────────────────
  const ftLabel=document.createElement('div');
  ftLabel.style.cssText='text-align:center;font-family:\'Source Code Pro\',monospace;font-size:9px;color:#3a3530;margin-top:4px;letter-spacing:2px;';
  ftLabel.textContent = cellFt===1 ? 'SCALE: 1 cell = 1 foot' : `SCALE: 1 cell = ${cellFt} feet`;
  container.appendChild(ftLabel);

  // ── Title & annotations ────────────────────────────────
  const totalFtW = cols * cellFt;
  const totalFtH = rows * cellFt;
  const displaySqFt = searchSqFt || (totalFtW * totalFtH);
  document.getElementById('grid-title').textContent =
    `${rule.name} — ${totalFtW}ft × ${totalFtH}ft`;

  let annotations='';
  if(searchSqFt) annotations+=`<span class="annotation">Room: ${totalFtW}ft × ${totalFtH}ft = ${searchSqFt} sq ft</span>`;
  if(handlerRowIdx!=null && rule.handlerDistFt)
    annotations+=`<span class="annotation">Handler line: ${handlerRowIdx*cellFt} ft from items</span>`;
  if(rule.groups>0 && rule.groupSpacingIn)
    annotations+=`<span class="annotation">${rule.groupSpacingIn.between}</span>`;
  if(rule.minDistDiffScents)
    annotations+=`<span class="annotation">Min ${rule.minDistDiffScents} between different scents</span>`;
  document.getElementById('grid-annotations').innerHTML=annotations;

  // ── SIDE PANEL ─────────────────────────────────────────
  renderSidePanel(data, rule, s);
}

function renderSidePanel(data, rule, s) {
  const panel = document.getElementById('side-panel');
  const { placedHides, hideCount, placedItems, rows, cols, cellFt, searchSqFt } = data;

  // Hide list
  const hideListHTML = placedHides.map((h,i)=>{
    const m=SCENT_META[h.scent];
    const ftRow=h.row*cellFt, ftCol=h.col*cellFt;
    return `<div class="hide-list-item">
      <div class="hide-dot" style="background:${m.border};box-shadow:0 0 4px ${m.border}88"></div>
      <span style="color:${m.text};font-family:'Source Code Pro',monospace;font-size:12px">Hide ${i+1}</span>
      <span style="color:#3a3530;font-size:11px;margin-left:auto;font-family:'Source Code Pro',monospace">${ftCol}ft, ${ftRow}ft</span>
      <span style="background:${m.bg};border:1px solid ${m.border};color:${m.text};font-family:'Source Code Pro',monospace;font-size:10px;padding:2px 6px;border-radius:2px">${h.scent}</span>
    </div>`;
  }).join('');

  // Legend
  const legendEntries=[
    {bg:'#f8f6f3',border:'#d8d0c8',icon:'',label:'Empty / Search area'},
    {bg:'#ffffff',border:'#2a2420',icon:'<span style="color:#7a5a20;font-size:13px;line-height:1">□</span>',label:'Box / Container'},
    {bg:'#ffffff',border:'#2a2420',icon:'<span style="font-size:11px;line-height:1">🪑</span>',label:'Chair'},
    {bg:'#ffffff',border:'#2a2420',icon:'<span style="color:#1e5c30;font-size:13px;line-height:1">▽</span>',label:'Item / Object'},
    {bg:'#ffffff',border:'#c0392b',icon:'<span style="color:#c0392b;font-size:10px;font-weight:700;font-family:\'Source Code Pro\',monospace">D</span>',label:'Distraction item'},
    {bg:'repeating-linear-gradient(90deg,#c8860a18 0,#c8860a18 4px,transparent 4px,transparent 8px)',border:'#a06800',icon:'',label:'Handler line'},
    {bg:'repeating-linear-gradient(90deg,#1e6aad18 0,#1e6aad18 4px,transparent 4px,transparent 8px)',border:'#1e6aad',icon:'',label:'Start line'},
  ];
  const legendHTML=legendEntries.map(l=>`<div class="legend-row">
    <div class="legend-swatch" style="background:${l.bg};border:1px solid ${l.border};display:flex;align-items:center;justify-content:center">${l.icon}</div>
    <span>${l.label}</span>
  </div>`).join('');

  // Scent legend
  const scentLegend=rule.scents.map(sc=>{
    const m=SCENT_META[sc];
    return `<div class="legend-row">
      <div class="legend-swatch" style="background:${m.bg};border:1px solid ${m.border}"></div>
      <span style="color:${m.darkText};font-weight:600">${sc} (${m.label})</span>
    </div>`;
  }).join('');

  panel.innerHTML=`
    <div class="side-card">
      <div class="side-card-head">Course Stats</div>
      <div class="side-card-body">
        <div class="stat-row"><span class="stat-label">Class</span><span class="stat-val">${rule.code}</span></div>
        <div class="stat-row"><span class="stat-label">Hides placed</span><span class="stat-val hl">${hideCount}</span></div>
        <div class="stat-row"><span class="stat-label">Items placed</span><span class="stat-val">${placedItems.length}</span></div>
        <div class="stat-row"><span class="stat-label">Distractions</span><span class="stat-val">${rule.distractions}</span></div>
        ${searchSqFt?`<div class="stat-row"><span class="stat-label">Search area</span><span class="stat-val">${searchSqFt} sq ft</span></div>`:''}
        ${rule.handlerDistFt?`<div class="stat-row"><span class="stat-label">Handler dist.</span><span class="stat-val hl">${rule.handlerDistFt.min}–${rule.handlerDistFt.max} ft</span></div>`:''}
        <div class="stat-row"><span class="stat-label">Time limit</span><span class="stat-val hl">${rule.timeRange||fmtTime(rule.timeSeconds)}</span></div>
        <div class="stat-row"><span class="stat-label">Height max</span><span class="stat-val">${rule.heightMax}</span></div>
      </div>
    </div>

    <div class="side-card">
      <div class="side-card-head">Hide Locations (Judge View)</div>
      <div class="side-card-body">${hideListHTML}</div>
    </div>

    <div class="side-card">
      <div class="side-card-head">Scent Key</div>
      <div class="side-card-body">${scentLegend}</div>
    </div>

    <div class="side-card">
      <div class="side-card-head">Legend</div>
      <div class="side-card-body">${legendHTML}</div>
    </div>

    <button class="btn-primary" onclick="renderSetupGrid()">↺ Generate New Course</button>
    <button class="btn-secondary" onclick="window.print()">🖨 Print / Save PDF</button>
  `;
}

// ══════════════════════════════════════════════════════════════
// INIT — Build all selectors and render defaults
// ══════════════════════════════════════════════════════════════
function initRulesPage() {
  buildSeriesBtns('series-btns-rules', 'rulesState', k=>{
    rulesState.classKey=k;
    buildClassBtns('class-btns-rules','rulesState',renderRules);
    renderRules(k);
  });
  buildClassBtns('class-btns-rules','rulesState',renderRules);
  renderRules(rulesState.classKey);
}

function initSetupPage() {
  buildSeriesBtns('series-btns-setup','setupState',k=>{
    setupState.classKey=k;
    buildClassBtns('class-btns-setup','setupState',classKey=>{
      setupState.classKey=classKey;
      renderSetupGrid();
    });
    renderSetupGrid();
  });
  buildClassBtns('class-btns-setup','setupState',classKey=>{
    setupState.classKey=classKey;
    renderSetupGrid();
  });
  renderSetupGrid();
}

// Make state objects window-accessible for the builder functions
window.rulesState = rulesState;
window.setupState = setupState;

// Boot
initRulesPage();
initSetupPage();
</script>
